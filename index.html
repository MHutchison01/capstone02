function tog(){const i=document.getElementById("pw");const e=document.getElementById("eye");if(i.type==="password"){i.type="text";e.innerHTML="&#128584;";e.setAttribute("aria-label","Hide password");}else{i.type="password";e.innerHTML="&#128065;";e.setAttribute("aria-label","Show password");}i.focus();}
async function go(){
 const pw=document.getElementById("pw").value;
 try{
  const raw=Uint8Array.from(atob(B),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16), iv=raw.slice(16,28), ct=raw.slice(28);
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:600000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:iv},key,ct);
  document.open();document.write(new TextDecoder().decode(pt));document.close();
 }catch(e){document.getElementById("err").style.display="block";}
}
document.getElementById("pw").addEventListener("keydown",e=>{if(e.key==="Enter")go();});
</script></body></html>
